name: Test basic usage with validation disabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create minimal package.json fixture
        run: |
          mkdir -p conformance-resources
          cat > package.json <<'EOF'
          {
            "name": "test-fhir-project",
            "version": "1.0.0",
            "fhirVersions": ["4.0.1"],
            "dependencies": {}
          }
          EOF

      - id: action
        uses: .
        with:
          PATH_TO_CONFORMANCE_RESOURCES: conformance-resources
          PATH_TO_QUALITY_CONTROL_RULES: minimal
          SIMPLIFIER_USERNAME: test@example.com
          SIMPLIFIER_PASSWORD: test-password
          DOTNET_VALIDATION_ENABLED: false
          JAVA_VALIDATION_ENABLED: false
          SUSHI_ENABLED: false

      - name: Assert action completed
        run: |
          echo "Action completed successfully with validation disabled"
          echo "PASS"
