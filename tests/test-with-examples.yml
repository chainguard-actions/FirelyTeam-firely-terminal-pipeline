name: Test with examples and sushi options (validators disabled)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create minimal package.json for FHIR version detection
        run: |
          cat > "$GITHUB_WORKSPACE/package.json" <<'EOF'
          {
            "name": "test-fhir-project",
            "version": "1.0.0",
            "fhirVersions": ["4.0.1"],
            "dependencies": {}
          }
          EOF

      - name: Create conformance resources and examples directories
        run: |
          mkdir -p "$GITHUB_WORKSPACE/conformance"
          mkdir -p "$GITHUB_WORKSPACE/examples"

      - id: action
        uses: .
        with:
          PATH_TO_CONFORMANCE_RESOURCES: conformance
          PATH_TO_EXAMPLES: examples
          SIMPLIFIER_USERNAME: test@example.com
          SIMPLIFIER_PASSWORD: test-password
          DOTNET_VALIDATION_ENABLED: false
          JAVA_VALIDATION_ENABLED: false
          SUSHI_ENABLED: false
          SUSHI_OPTIONS: "--no-sushi"

      - name: Assert action completed successfully
        run: |
          echo "Action completed with PATH_TO_EXAMPLES and SUSHI_OPTIONS set"
          echo "PASS"
