name: Test with expected fails and quality control rules (validators disabled)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create minimal package.json for FHIR version detection
        run: |
          cat > "$GITHUB_WORKSPACE/package.json" <<'EOF'
          {
            "name": "test-fhir-project",
            "version": "1.0.0",
            "fhirVersions": ["4.0.1"],
            "dependencies": {}
          }
          EOF

      - name: Create conformance resources directory and quality control rules
        run: |
          mkdir -p "$GITHUB_WORKSPACE/conformance"
          mkdir -p "$GITHUB_WORKSPACE/qc"
          cat > "$GITHUB_WORKSPACE/qc/custom.rules.yaml" <<'EOF'
          # Minimal quality control rules file
          rules: []
          EOF

      - id: action
        uses: .
        with:
          PATH_TO_CONFORMANCE_RESOURCES: conformance
          PATH_TO_QUALITY_CONTROL_RULES: qc/custom
          EXPECTED_FAILS: VALIDATION_CONFORMANCE_DOTNET VALIDATION_CONFORMANCE_JAVA VALIDATION_EXAMPLES_JAVA
          SIMPLIFIER_USERNAME: test@example.com
          SIMPLIFIER_PASSWORD: test-password
          DOTNET_VALIDATION_ENABLED: false
          JAVA_VALIDATION_ENABLED: false
          SUSHI_ENABLED: false

      - name: Assert action completed successfully
        run: |
          echo "Action completed with EXPECTED_FAILS and PATH_TO_QUALITY_CONTROL_RULES set"
          echo "PASS"
