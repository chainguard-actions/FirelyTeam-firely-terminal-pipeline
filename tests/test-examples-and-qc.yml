name: Test with examples, quality control rules, and expected fails
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create minimal package.json and directories
        run: |
          mkdir -p "$GITHUB_WORKSPACE/conformance"
          mkdir -p "$GITHUB_WORKSPACE/examples"
          cat > "$GITHUB_WORKSPACE/package.json" <<'EOF'
          {
            "name": "test-fhir-project",
            "version": "1.0.0",
            "fhirVersions": ["4.0.1"],
            "dependencies": {}
          }
          EOF

      - id: action
        uses: .
        with:
          PATH_TO_CONFORMANCE_RESOURCES: conformance
          PATH_TO_EXAMPLES: examples
          PATH_TO_QUALITY_CONTROL_RULES: minimal
          EXPECTED_FAILS: VALIDATION_CONFORMANCE_DOTNET
          SIMPLIFIER_USERNAME: test@example.com
          SIMPLIFIER_PASSWORD: test-password
          DOTNET_VALIDATION_ENABLED: false
          JAVA_VALIDATION_ENABLED: false
          SUSHI_ENABLED: false

      - name: Assert action completed successfully
        run: |
          echo "Action completed with PATH_TO_EXAMPLES, PATH_TO_QUALITY_CONTROL_RULES, and EXPECTED_FAILS inputs"
          echo "PASS"
