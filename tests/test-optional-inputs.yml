name: Test optional inputs coverage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create minimal package.json fixture
        run: |
          cat > package.json <<'EOF'
          {
            "name": "test-fhir-project",
            "version": "1.0.0",
            "fhirVersions": ["4.0.1"],
            "dependencies": {}
          }
          EOF

      - name: Create conformance resources directory
        run: mkdir -p conformance

      - name: Create examples directory
        run: mkdir -p examples

      - id: action
        uses: .
        with:
          PATH_TO_CONFORMANCE_RESOURCES: conformance
          PATH_TO_EXAMPLES: examples
          PATH_TO_QUALITY_CONTROL_RULES: minimal
          SIMPLIFIER_USERNAME: test@example.com
          SIMPLIFIER_PASSWORD: testpassword
          DOTNET_VALIDATION_ENABLED: false
          JAVA_VALIDATION_ENABLED: false
          SUSHI_ENABLED: false
          EXPECTED_FAILS: VALIDATION_CONFORMANCE_DOTNET
          FIRELY_TERMINAL_VALIDATOR_ENGINE: firely
          SUSHI_OPTIONS: --no-sushi-log

      - name: Assert action completed with optional inputs
        run: |
          echo "Action completed successfully with optional inputs set"
          echo "PASS"
