name: Test disabled validation (no dotnet or java required)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create minimal package.json fixture
        run: |
          mkdir -p conformance-resources
          cat > package.json <<'EOF'
          {
            "name": "test-fhir-project",
            "version": "1.0.0",
            "fhirVersions": ["4.0.1"],
            "dependencies": {}
          }
          EOF
          echo "Created package.json"

      - name: Create dummy conformance resource
        run: |
          mkdir -p conformance-resources
          cat > conformance-resources/StructureDefinition-example.json <<'EOF'
          {
            "resourceType": "StructureDefinition",
            "id": "example",
            "url": "http://example.org/StructureDefinition/example",
            "name": "Example",
            "status": "draft",
            "kind": "resource",
            "abstract": false,
            "type": "Patient",
            "baseDefinition": "http://hl7.org/fhir/StructureDefinition/Patient",
            "derivation": "constraint"
          }
          EOF
          echo "Created dummy conformance resource"

      - id: action
        uses: .
        with:
          PATH_TO_CONFORMANCE_RESOURCES: conformance-resources
          PATH_TO_EXAMPLES: examples
          PATH_TO_QUALITY_CONTROL_RULES: minimal
          DOTNET_VALIDATION_ENABLED: false
          JAVA_VALIDATION_ENABLED: false
          EXPECTED_FAILS: VALIDATION_CONFORMANCE_DOTNET
          FIRELY_TERMINAL_VALIDATOR_ENGINE: firely
          SIMPLIFIER_USERNAME: test@example.com
          SIMPLIFIER_PASSWORD: test-password
          SUSHI_ENABLED: false
          SUSHI_OPTIONS: ""

      - name: Assert action completed successfully
        run: |
          echo "Action completed without error"
          echo "PASS"
