name: Test - Expected Fails and Quality Control Rules inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create minimal package.json fixture
        run: |
          cat > package.json <<'EOF'
          {
            "name": "test-fhir-project",
            "version": "1.0.0",
            "fhirVersions": ["4.0.1"],
            "dependencies": {}
          }
          EOF

      - name: Create minimal conformance resources directory
        run: |
          mkdir -p conformance-resources

      - id: action
        uses: .
        with:
          PATH_TO_CONFORMANCE_RESOURCES: conformance-resources
          DOTNET_VALIDATION_ENABLED: "false"
          JAVA_VALIDATION_ENABLED: "false"
          EXPECTED_FAILS: "VALIDATION_CONFORMANCE_DOTNET VALIDATION_CONFORMANCE_JAVA"
          PATH_TO_QUALITY_CONTROL_RULES: "quality-control/custom"
          SIMPLIFIER_USERNAME: "dummy@example.com"
          SIMPLIFIER_PASSWORD: "dummy-password"

      - name: Assert action completed successfully with EXPECTED_FAILS and QC rules inputs
        run: |
          echo "Action completed with EXPECTED_FAILS and PATH_TO_QUALITY_CONTROL_RULES inputs set"
          echo "PASS"
